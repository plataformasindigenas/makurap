index_about_title: "Sobre o Projeto"
index_about_p1: >-
  <strong>Makurap</strong> é uma plataforma dedicada à preservação,
  documentação e valorização dos saberes linguísticos e culturais do povo Makurap.
index_about_p2: >-
  Este repositório reúne uma variedade de recursos linguísticos e etnográficos, tanto
  históricos quanto contemporâneos, com o objetivo de apoiar o ensino, a pesquisa e os
  esforços de revitalização da língua Makurap. A plataforma oferece um conjunto de
  ferramentas voltadas para o estudo linguístico e antropológico.

