# About page
nav_about: "Sobre"
about_title: "Makurap"
about_subtitle: "Plataforma digital de documentação e revitalização da língua e cultura Makurap"
about_mission_heading: "Missão"
about_mission: >
  <p>Esta plataforma é uma iniciativa da
  <a href="https://portal.plataformasindigenas.org">Plataforma de Línguas Indígenas</a>
  dedicada à documentação, preservação e revitalização da língua e cultura do povo
  Makurap, falantes de uma língua da família Tupí (ramo Tuparí) no sul de Rondônia.</p>
  <p>Nosso objetivo é disponibilizar materiais linguísticos, etnográficos e culturais
  em formato digital acessível, contribuindo para o fortalecimento da identidade
  Makurap e para a pesquisa sobre línguas indígenas brasileiras.</p>
about_partners_heading: "Equipe e Parceiros"
about_partners: >
  <p>Este projeto é desenvolvido em colaboração com:</p>
  <p><strong>Unifacc</strong> — Centro Universitário, parceiro institucional<br>
  <strong>Missão Salesiana de Mato Grosso</strong> — Parceria histórica com os povos indígenas da região<br>
  <strong>Universidade de Uppsala</strong> — Apoio em linguística computacional e tecnologia</p>
about_contact_heading: "Contato"
about_contact: >
  <p>Para mais informações sobre o projeto, colaborações ou contribuições:</p>
  <p><strong>E-mail:</strong> <a href="mailto:info@plataformasindigenas.org">info@plataformasindigenas.org</a><br>
  <strong>Portal:</strong> <a href="https://portal.plataformasindigenas.org">portal.plataformasindigenas.org</a></p>
about_citation_heading: "Como Citar"
about_citation: "Plataforma de Línguas Indígenas. Plataforma Digital da Língua e Cultura Makurap. Disponível em: https://makurap.terradoc.org. Acesso em: 2026."
about_tools_heading: "Tecnologias"
about_tools: "<p>Esta plataforma foi construída com ferramentas de código aberto desenvolvidas especificamente para documentação de línguas indígenas:</p>"
about_tool_terradoc: "Framework de geração de sites para documentação linguística indígena"
about_tool_aptoro: "Pipeline de conversão e processamento de dados"
