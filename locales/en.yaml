index_about_title: "About the Project"
index_about_p1: >-
  <strong>Makurap</strong> is a platform dedicated to the preservation,
  documentation, and appreciation of the linguistic and cultural knowledge of the Makurap people.
index_about_p2: >-
  This repository brings together a variety of linguistic and ethnographic resources, both
  historical and contemporary, with the goal of supporting teaching, research, and
  revitalization efforts for the Makurap language. The platform offers a set of
  tools aimed at linguistic and anthropological study.

